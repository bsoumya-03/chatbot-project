<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — GymBuddy Assistant</title>

  <!-- No flash fix -->
  <script>
    (function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css"/>

  <style>
    /* ── PROFILE PAGE ── */
    .profile-section {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    /* ── PROFILE CARD ── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      position: relative;
      overflow: hidden;
    }

    /* Green top line */
    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, rgba(182,245,66,0.2), var(--accent));
      border-radius: 24px 24px 0 0;
    }

    /* ── AVATAR ── */
    .avatar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #42f5c8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #0d0d0d;
      margin-bottom: 16px;
      border: 3px solid rgba(182,245,66,0.3);
    }

    .profile-username {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff !important;
    margin-bottom: 4px;
    }
    .profile-email {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── DIVIDER ── */
    .profile-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* ── SETTINGS SECTION ── */
    .settings-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    /* ── SETTING ITEM ── */
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.25s, transform 0.2s;
    }

    .setting-item:hover {
      border-color: rgba(182,245,66,0.4);
      transform: translateX(4px);
    }

    .setting-item .setting-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .setting-icon {
      font-size: 18px;
    }

    .setting-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .setting-arrow {
      color: var(--muted);
      font-size: 16px;
    }

    /* ── LOGOUT BUTTON ── */
    .logout-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: transparent;
      border: 1px solid #ff6b6b;
      border-radius: 12px;
      color: #ff6b6b;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .logout-btn:hover {
      background: rgba(255,107,107,0.1);
      transform: translateY(-2px);
    }

    /* ── CHANGE PASSWORD MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, rgba(182,245,66,0.2), var(--accent));
      border-radius: 20px 20px 0 0;
    }

    .modal h2 {
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .modal label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .modal input {
      width: 100%;
      margin-bottom: 16px;
    }

    .modal-btns {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .modal-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-save {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
    }

    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover { border-color: var(--accent); color: var(--text); }

    .modal-status {
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }
    .modal-status.success { color: var(--accent); }
    .modal-status.error { color: #ff6b6b; }

    /* Light mode fixes */
    html.dark body { --bg: #080808; --surface: #111; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🤖 GymBuddy Assistant</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="profile.html" style="color:var(--accent)">👤 Profile</a></li>
      <li><a href="#" id="logout-btn">Logout</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </nav>

  <!-- PROFILE SECTION -->
  <div class="profile-section">
    <div class="profile-card">
        <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
    <button onclick="history.back()" style="
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    " onmouseover="this.style.borderColor='#b6f542';this.style.color='#b6f542'" 
       onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
      ✕
    </button>
  </div>

      <!-- Avatar + Name + Email -->
      <div class="avatar-wrapper">
        <div class="avatar" id="avatar-initials">?</div>
        <div class="profile-username" id="profile-username">Loading...</div>
        <div class="profile-email" id="profile-email">Loading...</div>
      </div>

      <div class="profile-divider"></div>

      <!-- Settings -->
      <div class="settings-label">Account Settings</div>

      <!-- Change Password -->
      <div class="setting-item" id="change-password-btn">
        <div class="setting-left">
          <span class="setting-icon">🔒</span>
          <span class="setting-text">Change Password</span>
        </div>
        <span class="setting-arrow">→</span>
      </div>

      <!-- Logout -->
      <button class="logout-btn" id="profile-logout-btn">
        🚪 Logout
      </button>

    </div>
  </div>

  <!-- CHANGE PASSWORD MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>🔒 Change Password</h2>
      <label>Current Password</label>
      <input type="password" id="current-password" placeholder="Enter current password"/>
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="Enter new password"/>
      <label>Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm new password"/>
      <div class="modal-btns">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Save</button>
      </div>
      <p class="modal-status" id="modal-status"></p>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
      const isDark = document.documentElement.classList.contains("dark");
      const btn = document.querySelector(".theme-toggle");
      if (btn) btn.textContent = isDark ? "☀️" : "🌙";
      localStorage.setItem("theme", isDark ? "dark" : "light");
    }
    // ── LOAD USER INFO FROM TOKEN ──
    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch (e) {
        return null;
      }
    }

    async function loadProfile() {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location = "/signin.html";
        return;
      }

      try {
        const res = await fetch("/api/profile", {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.username) {
          document.getElementById("profile-username").textContent = data.username;
          document.getElementById("profile-email").textContent = data.email;
          // Set avatar initials
          const initials = data.username.slice(0, 2).toUpperCase();
          document.getElementById("avatar-initials").textContent = initials;
        } else {
          window.location = "/signin.html";
        }
      } catch (err) {
        console.error(err);
      }
    }

    loadProfile();

    // ── LOGOUT ──
    document.getElementById("logout-btn").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location = "/index.html";
    });

    document.getElementById("profile-logout-btn").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location = "/index.html";
    });

    // ── CHANGE PASSWORD MODAL ──
    document.getElementById("change-password-btn").addEventListener("click", () => {
      document.getElementById("modal-overlay").classList.add("active");
    });

    document.getElementById("modal-cancel").addEventListener("click", () => {
      document.getElementById("modal-overlay").classList.remove("active");
      document.getElementById("modal-status").textContent = "";
    });

    document.getElementById("modal-save").addEventListener("click", async () => {
      const current = document.getElementById("current-password").value.trim();
      const newPass = document.getElementById("new-password").value.trim();
      const confirm = document.getElementById("confirm-password").value.trim();
      const status = document.getElementById("modal-status");

      if (!current || !newPass || !confirm) {
        status.textContent = "❌ All fields are required.";
        status.className = "modal-status error";
        return;
      }

      if (newPass !== confirm) {
        status.textContent = "❌ New passwords do not match.";
        status.className = "modal-status error";
        return;
      }

      if (newPass.length < 6) {
        status.textContent = "❌ Password must be at least 6 characters.";
        status.className = "modal-status error";
        return;
      }

      try {
        const token = localStorage.getItem("token");
        const res = await fetch("/api/change-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ currentPassword: current, newPassword: newPass })
        });
        const data = await res.json();
        if (data.success) {
          status.textContent = "✅ Password changed successfully!";
          status.className = "modal-status success";
          setTimeout(() => {
            document.getElementById("modal-overlay").classList.remove("active");
            status.textContent = "";
          }, 2000);
        } else {
          status.textContent = "❌ " + (data.error || "Something went wrong.");
          status.className = "modal-status error";
        }
      } catch (err) {
        status.textContent = "❌ Network error.";
        status.className = "modal-status error";
      }
    });
  </script>
</body>
</html>
