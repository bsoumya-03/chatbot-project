<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymBuddy Assistant - Chat</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Chat layout wrappers centered on large screens */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px max(48px, calc((100vw - 900px) / 2));
      overflow-y: auto;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    .message {
      max-width: 80%;
      padding: 14px 20px;
      margin: 12px 0;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .user-message {
      align-self: flex-end;
      background: var(--accent);
      color: #0d0d0d;
      font-weight: 500;
      border-radius: 20px 20px 4px 20px;
    }

    .bot-message {
      align-self: flex-start;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px 20px 20px 4px;
    }

    /* Input area tightly aligned */
    .chat-input {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px max(48px, calc((100vw - 900px) / 2)) 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .chat-input input {
      flex: 1;
      height: 54px;
      padding: 0 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .chat-input input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(182, 245, 66, 0.1);
    }
    
    .chat-input input::placeholder {
      color: var(--muted);
    }

    .chat-input button {
      height: 54px;
      padding: 0 32px;
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .chat-input button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(182, 245, 66, 0.25);
    }
    
    @media (max-width: 768px) {
      .chat-container { padding: 20px 24px; }
      .chat-input { padding: 16px 24px 20px; gap: 8px; }
      .message { max-width: 90%; }
      .chat-input input, .chat-input button { height: 50px; border-radius: 12px; }
      .chat-input button { padding: 0 24px; }
    }
    #message-input{
      margin-bottom: 0px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="logo">🤖 GymBuddy Assistant</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="signin.html">Sign In</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
   <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </nav>

  <!-- Chat Section -->
  <div class="chat-container" id="chat">
    <div class="bot-message message">Hi! 💪 I'm GymBuddy Assistant. How can I help you today? . Ask me anything!</div>
  </div>
  <!-- Input Section -->
  <div class="chat-input">
    <input type="text" id="message-input" placeholder="Type your question..." />
    <button id="send-btn">Send</button>
  </div>
  <script src="script.js"></script>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const themeToggle = document.getElementById("theme-toggle");

    // ✅ Add messages to UI
    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.classList.add("message", sender === "user" ? "user-message" : "bot-message");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // ✅ Send message to backend
    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      addMessage(message, "user");
      input.value = "";

      try {
        const token = localStorage.getItem("token"); // from login
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        if (data.reply) {
          addMessage(data.reply, "bot");
        } else {
          addMessage("⚠️ No response from server.", "bot");
        }
      } catch (err) {
        console.error(err);
        addMessage("⚠️ Error sending message.", "bot");
      }
    }

    // ✅ Send on button click
    sendBtn.addEventListener("click", sendMessage);

    // ✅ Send on Enter key
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
